<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brawlpedia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#05070A;
      --panel:#0D1117;
      --panel-2:#161B22;
      --border:#1F2933;
      --muted:#9AA4AF;
      --blue:#1F6FEB;
      --blue-2:#0D47A1;
      --yellow:#FFC72C;
      --red:#FF3C3C;
      --green:#00D084;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial;background:radial-gradient(1200px 600px at 10% -10%, #0D47A1 0%, transparent 60%), radial-gradient(1000px 500px at 110% 10%, #1F6FEB 0%, transparent 60%), var(--bg); color:#fff}

    /* LAYOUT */
    .app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    aside{background:linear-gradient(180deg,#0B0F14,#070A0E);border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:20px}
    main{padding:20px 24px}

    /* SIDEBAR */
    .brand{display:flex;align-items:center;gap:12px;font-weight:800}
    .brand .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--yellow),#fff);display:grid;place-items:center;color:#000;font-weight:900}
    .brand span{letter-spacing:.5px}
    .nav{display:flex;flex-direction:column;gap:6px}
    .nav a{display:flex;align-items:center;gap:10px;padding:12px 12px;border-radius:12px;color:#C9D1D9;text-decoration:none;border:1px solid transparent}
    .nav a:hover{background:var(--panel);border-color:var(--border)}
    .nav a.active{background:linear-gradient(135deg,#0D47A1,#1F6FEB);color:#fff}

    .palette{margin-top:auto;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px}
    .palette h4{margin:0 0 10px 0;font-size:12px;color:var(--muted);letter-spacing:.12em}
    .swatches{display:flex;gap:10px;flex-wrap:wrap}
    .sw{width:28px;height:28px;border-radius:8px;border:1px solid #0003}
    .sw.b{background:#1F6FEB}.sw.y{background:#FFC72C}.sw.r{background:#FF3C3C}.sw.g{background:#00D084}.sw.d{background:#0D1117}.sw.l{background:#A0AEC0}.sw.w{background:#FFFFFF}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .tabs{display:flex;gap:16px}
    .tabs a{color:#C9D1D9;text-decoration:none;font-weight:600}
    .tabs a:hover{color:#fff}
    .actions{display:flex;gap:10px;align-items:center}
    .btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:#fff;cursor:pointer}
    .btn.primary{background:linear-gradient(135deg,#0D47A1,#1F6FEB);border-color:transparent}

    /* HERO */
    .hero{background:linear-gradient(135deg,#0D47A1,#1F6FEB);border-radius:20px;padding:20px;display:grid;grid-template-columns:1.2fr .8fr;gap:16px;border:1px solid #ffffff14;box-shadow:0 20px 40px #0008}
    .hero h1{margin:6px 0 8px 0;font-size:28px}
    .hero p{margin:0;color:#E6EDF3}
    .hero .cta{display:flex;gap:10px;margin-top:14px}
    .pill{font-size:12px;background:#0004;border:1px solid #ffffff22;padding:6px 10px;border-radius:999px;display:inline-flex;gap:6px;align-items:center}
    .hero-art{border-radius:16px;background:linear-gradient(180deg,#0003,#0007);min-height:140px}

    .search-wrap{margin-top:14px;position:relative}
    .search{width:100%;padding:14px 14px;border-radius:12px;border:1px solid #ffffff33;background:#0B1220;color:#fff}
    .suggestions{position:absolute;top:52px;left:0;right:0;background:#0E1523;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 20px 30px #000a;z-index:20}
    .suggestion{padding:12px;border-bottom:1px solid #ffffff12;cursor:pointer}
    .suggestion:hover{background:#1F6FEB}

    /* GRID */
    .grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:16px}
    .card{background:var(--panel-2);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 10px 30px #0006}
    .card h3{margin:0 0 10px 0;color:var(--yellow);font-size:14px;letter-spacing:.08em}

    .live-badge{color:#fff;background:var(--red);border-radius:999px;padding:4px 8px;font-size:11px;margin-left:6px}

    .match{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #ffffff12}
    .team{display:flex;align-items:center;gap:8px}
    .score{font-weight:800}

    .list-item{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid #ffffff12;font-size:14px}
    .tag{color:var(--blue);font-weight:700}

    .standings .row{display:grid;grid-template-columns:20px 1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid #ffffff12}

    /* FOOTER NAV */
    .footer-nav{display:flex;gap:18px;justify-content:center;color:#8B949E;margin-top:16px;font-size:12px}

    /* RESPONSIVE */
    @media (max-width: 1024px){
      .app{grid-template-columns:80px 1fr}
      aside .brand span, aside .nav a span{display:none}
    }
    @media (max-width: 800px){
      .app{grid-template-columns:1fr}
      aside{position:sticky;top:0;z-index:30;flex-direction:row;align-items:center;justify-content:space-between}
      .nav{flex-direction:row}
      .palette{display:none}
      main{padding:16px}
      .hero{grid-template-columns:1fr}
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="logo">★</div>
        <span>BRAWLPEDIA</span>
      </div>
      <nav class="nav">
        <a href="#"><span>Teams</span></a>
        <a href="#"><span>Tournament</span></a>
        <a href="#"><span>Players</span></a>
      </nav>
    </aside>

    <main>
        <div class="topbar">
        <div class="tabs">
          <a href="#match">Matches</a>
          <a href="#event">Events</a>
          <a href="#rank">Rankings</a>
        </div>
      </div>
      <section class="hero">
          <div class="search-wrap">
            <input id="search" class="search" placeholder="Rechercher joueur ou équipe..." />
            <div id="suggestions" class="suggestions"></div>
          </div>
        </div>
        <div class="hero-art"></div>
      </section>

      <section class="grid">
        <div class="card" id="match">
          <h3>LIVE MATCH <span class="live-badge">LIVE</span></h3>
          <div id="live"></div>
          <h3 style="margin-top:14px">RECENT RESULTS</h3>
          <div id="results"></div>
        </div>

        <div class="card" id="rank">
          <h3>UPCOMING</h3>
          <div id="upcoming"></div>
          <h3 style="margin-top:14px">STANDINGS</h3>
          <div id="standings" class="standings"></div>
        </div>
      </section>

      <section class="card" style="margin-top:16px" id="event">
        <h3>INFOS RÉCENTES</h3>
        <div id="news"></div>
      </section>
          <div class="footer-nav">
        <span>STATS</span><span>HISTORY</span><span>COMMUNITY</span><span>LEGACY</span>
      </div>
    </main>
  </div>

  <script>
    let searchData = [];
    fetch('search.json').then(r=>r.json()).then(j=>searchData=j);

    const sInput = document.getElementById('search');
    const sBox = document.getElementById('suggestions');
    sInput.addEventListener('input', ()=>{
      const v = sInput.value.toLowerCase();
      sBox.innerHTML='';
      if(!v) return;
      searchData.filter(i=>i.name.toLowerCase().includes(v)).forEach(i=>{
        const d=document.createElement('div');d.className='suggestion';d.textContent=i.name;
        d.onclick=()=>location.href=i.link; sBox.appendChild(d);
      });
    });
    sInput.addEventListener('keypress',e=>{
      if(e.key==='Enter'){
        const v=sInput.value.toLowerCase();
        const f=searchData.find(i=>i.name.toLowerCase()===v);
        if(f) location.href=f.link;
      }
    });

    // DATA
    fetch('matches.json').then(r=>r.json()).then(j=>{
      const live=document.getElementById('live');
      const res=document.getElementById('results');
      const up=document.getElementById('upcoming');
      const st=document.getElementById('standings');

      // 🔴 LIVE (si aucun match live)
      live.innerHTML='';
      if(!j.live || j.live.length === 0){
        live.innerHTML = `<div style="opacity:.7">Aucun match en direct</div>`;
      } else {
        j.live.forEach(m=>{
          const d=document.createElement('div'); d.className='match';
          d.innerHTML=`<div class='team'>${m.team1}</div><div class='score'>${m.score}</div><div class='team' style='justify-content:flex-end'>${m.team2}</div>`;
          live.appendChild(d);
        });
      }

      // 🟢 RESULTS (matchs terminés uniquement)
      res.innerHTML='';
      if(j.results){
        j.results.forEach(m=>{
          const d=document.createElement('div'); d.className='match';
          d.innerHTML=`<div>${m.team1}</div><div class='score'>${m.score}</div><div style='text-align:right'>${m.team2}</div>`;
          res.appendChild(d);
        });
      }

      // 🔵 UPCOMING (matchs futurs)
      up.innerHTML='';
      if(j.upcoming){
        j.upcoming.forEach(m=>{
          const d=document.createElement('div'); d.className='list-item';
          d.innerHTML=`<span>${m.team1} vs ${m.team2}</span><span>${m.time}</span>`;
          up.appendChild(d);
        });
      }

      // 🟡 STANDINGS
st.innerHTML='';

const flags = {
  "Europe": "🇪🇺",
  "Asie": "🌏",
  "Amérique du Nord": "🇺🇸",
  "Amérique du Sud": "🇧🇷"
};

if(j.standings){
  j.standings.forEach(region=>{

    // 🏷️ titre région
    const title = document.createElement('div');
    title.style.marginTop = '12px';
    title.style.marginBottom = '6px';
    title.style.fontWeight = '700';
    title.style.color = '#FFC72C';
    title.textContent = (flags[region.region] || "🌍") + " " + region.region;

    st.appendChild(title);

    // 📊 équipes
    region.teams.forEach((t, idx)=>{
      const d = document.createElement('div');
      d.className = 'row';
      d.innerHTML = `
        <span>${idx+1}</span>
        <span>${t.name}</span>
        <span>${t.record}</span>
      `;
      st.appendChild(d);
    });

  });
}

    fetch('news.json').then(r=>r.json()).then(j=>{
      const n=document.getElementById('news'); n.innerHTML='';
      j.forEach(it=>{
        const d=document.createElement('div'); d.className='list-item';
        d.innerHTML=`<span><span class='tag'>${it.type}</span> ${it.title}</span><span>${it.time||''}</span>`;
        n.appendChild(d);
      });
    });
    })
  </script>
</body>
</html>
